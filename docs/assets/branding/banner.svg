<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02050f"/>
      <stop offset="50%" stop-color="#070d1e"/>
      <stop offset="100%" stop-color="#020308"/>
    </linearGradient>

    <!-- Accent Gradients -->
    <linearGradient id="accentCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
    
    <linearGradient id="accentPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7f00ff"/>
      <stop offset="100%" stop-color="#e100ff"/>
    </linearGradient>

    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#7f00ff"/>
    </linearGradient>

    <!-- Glowing effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-light" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>

  <!-- Hexagonal Grid Pattern in Background -->
  <g stroke="#00f2fe" stroke-width="0.3" opacity="0.08">
    <!-- Row 1 -->
    <polygon points="50,20 100,50 100,110 50,140 0,110 0,50"/>
    <polygon points="150,20 200,50 200,110 150,140 100,110 100,50"/>
    <polygon points="250,20 300,50 300,110 250,140 200,110 200,50"/>
    <polygon points="350,20 400,50 400,110 350,140 300,110 300,50"/>
    <polygon points="450,20 500,50 500,110 450,140 400,110 400,50"/>
    <polygon points="550,20 600,50 600,110 550,140 500,110 500,50"/>
    <polygon points="650,20 700,50 700,110 650,140 600,110 600,50"/>
    <polygon points="750,20 800,50 800,110 750,140 700,110 700,50"/>
    <!-- Row 2 (offset) -->
    <polygon points="100,110 150,140 150,200 100,230 50,200 50,140"/>
    <polygon points="200,110 250,140 250,200 200,230 150,200 150,140"/>
    <polygon points="300,110 350,140 350,200 300,230 250,200 250,140"/>
    <polygon points="400,110 450,140 450,200 400,230 350,200 350,140"/>
    <polygon points="500,110 550,140 550,200 500,230 450,200 450,140"/>
    <polygon points="600,110 650,140 650,200 600,230 550,200 550,140"/>
    <polygon points="700,110 750,140 750,200 700,230 650,200 650,140"/>
  </g>

  <!-- Cyber Wave Graphic (bottom right glow) -->
  <path d="M700,400 Q850,300 950,350 T1200,250 L1200,400 Z" fill="url(#accentPurple)" opacity="0.1" filter="url(#glow)"/>
  <path d="M800,400 Q950,250 1050,320 T1200,220 L1200,400 Z" fill="url(#accentCyan)" opacity="0.15" filter="url(#glow)"/>

  <!-- Radar Circles on the Right -->
  <circle cx="1000" cy="200" r="160" fill="none" stroke="#7f00ff" stroke-width="1" opacity="0.15"/>
  <circle cx="1000" cy="200" r="120" fill="none" stroke="#00f2fe" stroke-width="1.5" opacity="0.2" stroke-dasharray="10,5"/>
  <circle cx="1000" cy="200" r="80" fill="none" stroke="#00f2fe" stroke-width="0.5" opacity="0.2"/>
  <line x1="840" y1="200" x2="1160" y2="200" stroke="#00f2fe" stroke-width="0.5" opacity="0.15"/>
  <line x1="1000" y1="40" x2="1000" y2="360" stroke="#00f2fe" stroke-width="0.5" opacity="0.15"/>

  <!-- Left/Center Content -->
  
  <!-- Sleek Logo Icon on Left -->
  <g transform="translate(100, 100)">
    <!-- Cyber Shield -->
    <path d="M75,20 L135,40 C135,110 105,160 75,190 C45,160 15,110 15,40 Z" 
          fill="none" stroke="url(#shieldGrad)" stroke-width="5" filter="url(#glow-light)"/>
    <path d="M75,30 L125,50 C125,100 100,145 75,170 C50,145 25,100 25,50 Z" 
          fill="none" stroke="#00f2fe" stroke-width="1.5" opacity="0.5"/>
    <!-- AI Core -->
    <circle cx="75" cy="95" r="12" fill="none" stroke="#00f2fe" stroke-width="2"/>
    <circle cx="75" cy="95" r="5" fill="#7f00ff" filter="url(#glow-light)"/>
    <!-- Connection Nodes -->
    <circle cx="50" cy="75" r="4" fill="#00f2fe"/>
    <circle cx="100" cy="75" r="4" fill="#00f2fe"/>
    <circle cx="45" cy="115" r="4" fill="#7f00ff"/>
    <circle cx="105" cy="115" r="4" fill="#7f00ff"/>
    <circle cx="75" cy="140" r="5" fill="#00f2fe"/>
    <line x1="75" y1="95" x2="50" y2="75" stroke="#00f2fe" stroke-width="1.5"/>
    <line x1="75" y1="95" x2="100" y2="75" stroke="#00f2fe" stroke-width="1.5"/>
    <line x1="75" y1="95" x2="45" y2="115" stroke="#7f00ff" stroke-width="1.5"/>
    <line x1="75" y1="95" x2="105" y2="115" stroke="#7f00ff" stroke-width="1.5"/>
    <line x1="75" y1="95" x2="75" y2="140" stroke="#00f2fe" stroke-width="1.5"/>
  </g>

  <!-- Platform Title text -->
  <text x="280" y="170" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-weight="900" font-size="64" fill="#ffffff" letter-spacing="6">
    SENTINEL<tspan fill="#00f2fe">AI</tspan>
  </text>

  <!-- Tagline / Subtitle -->
  <text x="285" y="215" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-weight="700" font-size="20" fill="#a0aec0" letter-spacing="1.5">
    AI-Powered Cyber Defense &amp; SOC Copilot
  </text>

  <!-- Feature Pills -->
  <g transform="translate(285, 250)">
    <!-- Pill 1: Intrusion Sense -->
    <rect x="0" y="0" width="130" height="30" rx="15" fill="#0c1836" stroke="#00f2fe" stroke-width="1"/>
    <text x="65" y="20" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-weight="700" font-size="11" fill="#00f2fe" text-anchor="middle" letter-spacing="0.5">DECOY HONEYPOTS</text>

    <!-- Pill 2: AI Copilot -->
    <rect x="145" y="0" width="120" height="30" rx="15" fill="#0c1836" stroke="#7f00ff" stroke-width="1"/>
    <text x="205" y="20" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-weight="700" font-size="11" fill="#a855f7" text-anchor="middle" letter-spacing="0.5">AI SOC COPILOT</text>

    <!-- Pill 3: MITRE ATT&CK -->
    <rect x="280" y="0" width="135" height="30" rx="15" fill="#0c1836" stroke="#e2e8f0" stroke-width="1" opacity="0.8"/>
    <text x="347" y="20" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-weight="700" font-size="11" fill="#e2e8f0" text-anchor="middle" letter-spacing="0.5">MITRE ATT&amp;CK MAP</text>
  </g>

  <!-- Status / Version indicator on top right -->
  <g transform="translate(1030, 40)">
    <rect x="0" y="0" width="130" height="28" rx="6" fill="#061026" stroke="#7f00ff" stroke-width="1"/>
    <circle cx="18" cy="14" r="5" fill="#00f2fe" filter="url(#glow-light)"/>
    <text x="32" y="18" font-family="monospace" font-weight="700" font-size="11" fill="#ffffff">RELEASE v0.15.1</text>
  </g>

  <!-- Outer Futuristic Bracket Corners -->
  <path d="M 30,50 L 30,30 L 50,30" fill="none" stroke="#00f2fe" stroke-width="3" opacity="0.6"/>
  <path d="M 1170,50 L 1170,30 L 1150,30" fill="none" stroke="#00f2fe" stroke-width="3" opacity="0.6"/>
  <path d="M 30,350 L 30,370 L 50,370" fill="none" stroke="#00f2fe" stroke-width="3" opacity="0.6"/>
  <path d="M 1170,350 L 1170,370 L 1150,370" fill="none" stroke="#00f2fe" stroke-width="3" opacity="0.6"/>
</svg>
